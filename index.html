<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtrakt — Intelligence tool for the topics that drive your decisions</title>
<meta name="description" content="Xtrakt watches the topics that drive your decisions and surfaces what matters. An intelligence tool for professionals.">
<style>
  :root {
    --orange: #FF4500;
    --orange-soft: #FF6B33;
    --ink: #1A1A2E;
    --body: #2c2c3a;
    --muted: #6b6b7a;
    --rule: #e7e7ed;
    --bg: #FAFAFA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
    background: var(--bg);
    color: var(--body);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .hero {
    flex: 1;
    background: var(--ink);
    color: white;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 24px 80px;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255, 69, 0, 0.18), transparent 60%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255, 69, 0, 0.10), transparent 60%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 720px;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .logo-mark {
    width: 84px;
    height: 84px;
    background: #232342;
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 18px 60px rgba(255, 69, 0, 0.25);
  }
  .logo-mark svg { width: 56px; height: 56px; }
  .wordmark {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.04em;
    margin-bottom: 6px;
    color: white;
  }
  .tagline {
    font-size: 19px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    margin-bottom: 48px;
    letter-spacing: -0.005em;
  }
  .cta-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-primary {
    background: var(--orange);
    color: white;
    box-shadow: 0 6px 20px rgba(255, 69, 0, 0.35);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(255, 69, 0, 0.45);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.9);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.12);
  }
  footer {
    background: white;
    border-top: 1px solid var(--rule);
    padding: 22px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  footer a {
    color: var(--body);
    text-decoration: none;
    margin: 0 4px;
  }
  footer a:hover { color: var(--orange); text-decoration: underline; }
  footer .sep { color: var(--rule); margin: 0 6px; }
  @media (max-width: 600px) {
    .wordmark { font-size: 44px; }
    .tagline { font-size: 16px; margin-bottom: 36px; }
    .btn { padding: 13px 22px; font-size: 14px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <div class="logo-mark">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="14" stroke="white" stroke-width="5" fill="none"/>
        <line x1="34" y1="34" x2="48" y2="48" stroke="white" stroke-width="5" stroke-linecap="round"/>
        <line x1="24" y1="30" x2="24" y2="16" stroke="#FF4500" stroke-width="3.5" stroke-linecap="round"/>
        <polyline points="17,22 24,14 31,22" fill="none" stroke="#FF4500" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="wordmark">Xtrakt</div>
    <p class="tagline">An intelligence tool that watches the topics that drive your decisions.</p>
    <div class="cta-row">
      <a href="/privacy" class="btn btn-ghost">Privacy Policy</a>
      <a href="/terms" class="btn btn-ghost">Terms of Service</a>
      <a href="mailto:support@xtraktapp.com" class="btn btn-primary">Contact Support</a>
    </div>
  </div>
</section>

<footer>
  &copy; 2026 [ENTITY NAME]
  <span class="sep">·</span>
  <a href="/privacy">Privacy</a>
  <span class="sep">·</span>
  <a href="/terms">Terms</a>
  <span class="sep">·</span>
  <a href="mailto:support@xtraktapp.com">support@xtraktapp.com</a>
</footer>

</body>
</html>
